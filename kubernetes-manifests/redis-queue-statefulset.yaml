apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-queue
  namespace: frappe
spec:
  serviceName: redis-queue
  replicas: 1
  selector:
    matchLabels:
      app: redis-queue
  template:
    metadata:
      labels:
        app: redis-queue
    spec:
      containers:
      - name: redis
        image: redis:6.2-alpine
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: frappe-storage
      resources:
        requests:
          storage: 5Gi