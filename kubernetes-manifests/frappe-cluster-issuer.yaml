apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: frappe
spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email address for account recovery and important notifications
    email: kasaliismail2@gmail.com
    # Private key secret for ACME account
    privateKeySecretRef:
      name: frappe-tls
    # Enable HTTP-01 challenge solver
    solvers:
    - http01:
        ingress:
          class: nginx  # or traefik, gce, etc. based on your ingress controller